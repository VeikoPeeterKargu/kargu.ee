name: Deploy to kargu.ee

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP to Zone.ee
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import ftplib, os

          host = os.environ['FTP_HOST']
          user = os.environ['FTP_USER']
          passwd = os.environ['FTP_PASS']

          SKIP = {'.git', '.github', 'node_modules', '.DS_Store', '.gitignore'}
          SERVER_DIR = '/htdocs'

          ftp = ftplib.FTP()
          ftp.connect(host, 21, timeout=30)
          ftp.login(user, passwd)
          print('Logged in OK')

          def ensure_dir(ftp, path):
              try:
                  ftp.mkd(path)
              except Exception:
                  pass

          def upload_dir(ftp, local_path, remote_path):
              ensure_dir(ftp, remote_path)
              for item in sorted(os.listdir(local_path)):
                  if item in SKIP or item.startswith('.'):
                      continue
                  local_item = os.path.join(local_path, item)
                  remote_item = remote_path + '/' + item
                  if os.path.isdir(local_item):
                      upload_dir(ftp, local_item, remote_item)
                  else:
                      with open(local_item, 'rb') as f:
                          ftp.storbinary('STOR ' + remote_item, f)
                          print('Uploaded: ' + item)

          upload_dir(ftp, '.', SERVER_DIR)
          ftp.quit()
          print('Deploy complete!')
          PYEOF
